name: Ejecutar Predictscore Diario (3 veces al día)

on:
  schedule:
    # ☀️ Resumen Matutino — 8:00 AM UTC (4:00 AM EST / 12:00 PM VET)
    - cron: '0 8 * * *'
    # 🌤️ Resumen de Tarde — 14:00 UTC (10:00 AM EST / 2:00 PM VET)  
    - cron: '0 14 * * *'
    # 🌙 Resumen Nocturno — 20:00 UTC (4:00 PM EST / 8:00 PM VET)
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  ejecutar-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          pip install -r requirements.txt

      - name: 1. Generar Cartelera (Football-Data)
        run: python cartelera_automatica.py

      - name: 2. Entrenar IA y Predecir
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python predicciones_reales.py

      - name: 3. Enviar Alerta Telegram (Mañana / Tarde / Noche)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python alerta_telegram.py